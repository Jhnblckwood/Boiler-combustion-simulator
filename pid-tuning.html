<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PID Tuning Trainer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: #0f172a;
      --panel-2: #111827;
      --line: #1f2937;
      --text: #e5e7eb;
      --subtle: #94a3b8;
      --accent: #38bdf8;
      --good: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #0b1225, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, #0b1220, var(--panel));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0;
      font-size: 1.3rem;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--subtle);
      font-size: 0.9rem;
    }

    .section-title {
      margin: 14px 0 10px;
      color: #bfdbfe;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .control {
      margin-bottom: 10px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      color: #cbd5e1;
      font-size: 0.82rem;
    }

    input[type="range"] { width: 100%; }

    input[type="number"] {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
    }

    .inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    button {
      border: 1px solid #334155;
      background: #0b1220;
      color: var(--text);
      border-radius: 10px;
      padding: 9px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover { border-color: var(--accent); }
    .primary { background: #082f49; border-color: #0ea5e9; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .metric {
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 8px;
      background: #0a1020;
    }

    .metric .name { color: var(--subtle); font-size: 0.74rem; text-transform: uppercase; }
    .metric .value { margin-top: 2px; font-size: 1.1rem; font-weight: 700; }

    .plot {
      height: 430px;
      border-radius: 12px;
      border: 1px solid #1e293b;
      background: #020617;
      width: 100%;
      display: block;
    }

    .legend {
      display: flex;
      gap: 14px;
      color: var(--subtle);
      font-size: 0.82rem;
      margin-top: 10px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .dot.sp { background: #60a5fa; }
    .dot.pv { background: #34d399; }
    .dot.out { background: #f59e0b; }

    @media (max-width: 980px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>PID Tuning Trainer</h1>
      <p class="subtitle">Interactive HTML simulator for learning proportional, integral, and derivative tuning.</p>

      <div class="section-title">Controller</div>
      <div class="control">
        <label>Kp <span id="kpVal">2.00</span></label>
        <input id="kp" type="range" min="0" max="10" step="0.05" value="2" />
      </div>
      <div class="control">
        <label>Ki <span id="kiVal">0.60</span></label>
        <input id="ki" type="range" min="0" max="5" step="0.02" value="0.6" />
      </div>
      <div class="control">
        <label>Kd <span id="kdVal">0.20</span></label>
        <input id="kd" type="range" min="0" max="3" step="0.02" value="0.2" />
      </div>
      <div class="inline">
        <div class="control">
          <label>Setpoint</label>
          <input id="setpoint" type="number" value="60" step="1" />
        </div>
        <div class="control">
          <label>Output Clamp (0-100)</label>
          <input id="maxOut" type="number" value="100" step="1" min="10" max="100" />
        </div>
      </div>

      <div class="section-title">Process (FOPDT)</div>
      <div class="control">
        <label>Process Gain K <span id="gainVal">1.00</span></label>
        <input id="gain" type="range" min="0.3" max="3" step="0.05" value="1" />
      </div>
      <div class="control">
        <label>Time Constant τ (s) <span id="tauVal">18</span></label>
        <input id="tau" type="range" min="4" max="60" step="1" value="18" />
      </div>
      <div class="control">
        <label>Dead Time L (s) <span id="deadVal">2</span></label>
        <input id="dead" type="range" min="0" max="20" step="0.5" value="2" />
      </div>
      <div class="control">
        <label>Noise <span id="noiseVal">0.3</span></label>
        <input id="noise" type="range" min="0" max="2" step="0.1" value="0.3" />
      </div>

      <div class="btn-row">
        <button id="start" class="primary">Start</button>
        <button id="pause">Pause</button>
        <button id="reset">Reset</button>
      </div>

      <div class="metrics">
        <div class="metric"><div class="name">Error</div><div class="value" id="errMetric">0.00</div></div>
        <div class="metric"><div class="name">Overshoot</div><div class="value" id="ovMetric">0.0%</div></div>
        <div class="metric"><div class="name">Settling Time</div><div class="value" id="stMetric">—</div></div>
        <div class="metric"><div class="name">Controller Output</div><div class="value" id="outMetric">0.0%</div></div>
      </div>
    </div>

    <div class="card">
      <canvas id="plot" class="plot" width="820" height="430"></canvas>
      <div class="legend">
        <span><span class="dot sp"></span>Setpoint</span>
        <span><span class="dot pv"></span>Process Variable</span>
        <span><span class="dot out"></span>Controller Output</span>
      </div>
    </div>
  </div>

  <script>
    const state = {
      dt: 0.1,
      t: 0,
      running: false,
      integral: 0,
      prevError: 0,
      pv: 20,
      output: 0,
      pvHistory: [],
      spHistory: [],
      outHistory: [],
      tHistory: [],
      outDelay: [],
      maxPoints: 1200,
      peakPv: 20,
      settledAt: null
    };

    const $ = id => document.getElementById(id);

    const ui = {
      kp: $("kp"), ki: $("ki"), kd: $("kd"), setpoint: $("setpoint"), maxOut: $("maxOut"),
      gain: $("gain"), tau: $("tau"), dead: $("dead"), noise: $("noise"),
      kpVal: $("kpVal"), kiVal: $("kiVal"), kdVal: $("kdVal"),
      gainVal: $("gainVal"), tauVal: $("tauVal"), deadVal: $("deadVal"), noiseVal: $("noiseVal"),
      errMetric: $("errMetric"), ovMetric: $("ovMetric"), stMetric: $("stMetric"), outMetric: $("outMetric"),
      start: $("start"), pause: $("pause"), reset: $("reset"), plot: $("plot")
    };

    function syncLabels() {
      ui.kpVal.textContent = Number(ui.kp.value).toFixed(2);
      ui.kiVal.textContent = Number(ui.ki.value).toFixed(2);
      ui.kdVal.textContent = Number(ui.kd.value).toFixed(2);
      ui.gainVal.textContent = Number(ui.gain.value).toFixed(2);
      ui.tauVal.textContent = Number(ui.tau.value).toFixed(0);
      ui.deadVal.textContent = Number(ui.dead.value).toFixed(1);
      ui.noiseVal.textContent = Number(ui.noise.value).toFixed(1);
    }

    function gaussianNoise(strength) {
      const u1 = Math.random() || 1e-8;
      const u2 = Math.random();
      return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2) * strength;
    }

    function clamp(v, low, high) { return Math.min(high, Math.max(low, v)); }

    function resetModel() {
      state.t = 0;
      state.integral = 0;
      state.prevError = 0;
      state.pv = 20;
      state.output = 0;
      state.pvHistory = [];
      state.spHistory = [];
      state.outHistory = [];
      state.tHistory = [];
      state.peakPv = state.pv;
      state.settledAt = null;

      const deadSec = Number(ui.dead.value);
      const delaySamples = Math.max(1, Math.round(deadSec / state.dt));
      state.outDelay = Array(delaySamples).fill(0);

      ui.stMetric.textContent = "—";
      drawPlot();
      updateMetrics();
    }

    function stepModel() {
      const kp = Number(ui.kp.value);
      const ki = Number(ui.ki.value);
      const kd = Number(ui.kd.value);
      const sp = Number(ui.setpoint.value);
      const maxOut = Number(ui.maxOut.value);
      const gain = Number(ui.gain.value);
      const tau = Number(ui.tau.value);
      const noise = Number(ui.noise.value);

      const err = sp - state.pv;
      state.integral += err * state.dt;
      const derivative = (err - state.prevError) / state.dt;
      let rawOut = kp * err + ki * state.integral + kd * derivative;
      state.output = clamp(rawOut, 0, maxOut);

      if (state.output !== rawOut && ki > 0) {
        state.integral -= err * state.dt * 0.4;
      }

      state.outDelay.push(state.output);
      const delayedOut = state.outDelay.shift();

      const targetPv = gain * delayedOut;
      state.pv += ((targetPv - state.pv) / tau) * state.dt;
      state.pv += gaussianNoise(noise) * 0.05;

      state.t += state.dt;
      state.prevError = err;
      state.peakPv = Math.max(state.peakPv, state.pv);

      state.tHistory.push(state.t);
      state.pvHistory.push(state.pv);
      state.spHistory.push(sp);
      state.outHistory.push(state.output);

      if (state.tHistory.length > state.maxPoints) {
        state.tHistory.shift();
        state.pvHistory.shift();
        state.spHistory.shift();
        state.outHistory.shift();
      }

      const band = Math.max(1, sp * 0.02);
      if (Math.abs(err) <= band) {
        if (!state.settledAt) {
          state.settledAt = state.t;
        }
      } else {
        state.settledAt = null;
      }
    }

    function updateMetrics() {
      const sp = Number(ui.setpoint.value);
      const err = sp - state.pv;
      const overshoot = sp > 0 ? Math.max(0, (state.peakPv - sp) / sp * 100) : 0;

      ui.errMetric.textContent = err.toFixed(2);
      ui.ovMetric.textContent = overshoot.toFixed(1) + "%";
      ui.outMetric.textContent = state.output.toFixed(1) + "%";

      if (state.settledAt && state.t - state.settledAt > 2.5) {
        ui.stMetric.textContent = state.settledAt.toFixed(1) + " s";
      }
    }

    function drawAxes(ctx, w, h, pad) {
      ctx.strokeStyle = "#334155";
      ctx.lineWidth = 1;
      ctx.strokeRect(pad, pad, w - 2 * pad, h - 2 * pad);

      ctx.strokeStyle = "#1f2937";
      for (let i = 1; i < 6; i++) {
        const y = pad + i * ((h - 2 * pad) / 6);
        ctx.beginPath();
        ctx.moveTo(pad, y);
        ctx.lineTo(w - pad, y);
        ctx.stroke();
      }
    }

    function plotSeries(ctx, arrX, arrY, minX, maxX, minY, maxY, color, w, h, pad) {
      if (arrX.length < 2) return;
      ctx.beginPath();
      for (let i = 0; i < arrX.length; i++) {
        const x = pad + ((arrX[i] - minX) / (maxX - minX || 1)) * (w - 2 * pad);
        const y = h - pad - ((arrY[i] - minY) / (maxY - minY || 1)) * (h - 2 * pad);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawPlot() {
      const canvas = ui.plot;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const pad = 36;

      ctx.clearRect(0, 0, w, h);
      drawAxes(ctx, w, h, pad);

      if (state.tHistory.length < 2) return;

      const minX = state.tHistory[0];
      const maxX = state.tHistory[state.tHistory.length - 1];
      const minY = 0;
      const maxY = Math.max(100, ...state.spHistory, ...state.pvHistory, ...state.outHistory) * 1.1;

      plotSeries(ctx, state.tHistory, state.spHistory, minX, maxX, minY, maxY, "#60a5fa", w, h, pad);
      plotSeries(ctx, state.tHistory, state.pvHistory, minX, maxX, minY, maxY, "#34d399", w, h, pad);
      plotSeries(ctx, state.tHistory, state.outHistory, minX, maxX, minY, maxY, "#f59e0b", w, h, pad);
    }

    function tick() {
      if (state.running) {
        for (let i = 0; i < 3; i++) stepModel();
        updateMetrics();
        drawPlot();
      }
      requestAnimationFrame(tick);
    }

    [ui.kp, ui.ki, ui.kd, ui.gain, ui.tau, ui.dead, ui.noise].forEach(el => {
      el.addEventListener("input", () => {
        syncLabels();
        if (el === ui.dead) {
          const delaySamples = Math.max(1, Math.round(Number(ui.dead.value) / state.dt));
          state.outDelay = Array(delaySamples).fill(state.output);
        }
      });
    });

    ui.start.addEventListener("click", () => { state.running = true; });
    ui.pause.addEventListener("click", () => { state.running = false; });
    ui.reset.addEventListener("click", () => { state.running = false; resetModel(); });

    syncLabels();
    resetModel();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
